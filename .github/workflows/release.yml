name: Release

# Runs on version tags: builds + signs both arches (DEV_KEY secret) and
# attaches the s9pks to the GitHub release. The self-hosted registry / S3
# inputs (vars.RELEASE_REGISTRY etc.) are unset and their publish steps
# no-op — this package distributes via GitHub releases and the Start9
# community registry.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*'

jobs:
  release:
    uses: start9labs/shared-workflows/.github/workflows/release.yml@master
    with:
      # FREE_DISK_SPACE: true
      RELEASE_REGISTRY: ${{ vars.RELEASE_REGISTRY }}
      S3_S9PKS_BASE_URL: ${{ vars.S3_S9PKS_BASE_URL }}
    secrets:
      DEV_KEY: ${{ secrets.DEV_KEY }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
    permissions:
      contents: write
