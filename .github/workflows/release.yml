name: Release

# Manual-only: this shared workflow publishes to a self-hosted registry +
# S3 bucket (vars.RELEASE_REGISTRY / S3_S9PKS_BASE_URL + S3 secrets), which
# this package does not use — releases are cut as GitHub releases and
# submitted to the Start9 community registry instead.
on:
  workflow_dispatch:

jobs:
  release:
    uses: start9labs/shared-workflows/.github/workflows/release.yml@master
    with:
      # FREE_DISK_SPACE: true
      RELEASE_REGISTRY: ${{ vars.RELEASE_REGISTRY }}
      S3_S9PKS_BASE_URL: ${{ vars.S3_S9PKS_BASE_URL }}
    secrets:
      DEV_KEY: ${{ secrets.DEV_KEY }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
    permissions:
      contents: write
